<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交通 Dashboard</title>

  <style>
    body { font-family: Arial; margin:0; background:#0f0f10; color:#fff; }
    .wrap { padding:14px; max-width:520px; margin:auto; }
    .card { background:#1a1a1c; padding:12px; border-radius:12px; margin:10px 0; }
    .title { font-size:18px; font-weight:bold; }
    .small { font-size:12px; color:#aaa; }
    .error { color:#ff5555; font-size:12px; }
  </style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <div class="title">📍 聚星樓交通 Dashboard</div>

    <div id="weather">🌤️ --°C 💧--%</div>
    <div id="time" class="small">--</div>
    <div id="status" class="error"></div>
  </div>

  <div class="card">
    🚇 天水圍站<br>
    往 屯門: <div id="mtr1">--</div>
    往 烏溪沙: <div id="mtr2">--</div>
  </div>
  <div class="card">
  🚌 MTR 接駁巴士<br>
  <div id="mtrbus">--</div>
  </div>
  <div class="card">
    🚌 巴士<br>
    <div id="bus">--</div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
