<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>聚星樓交通 Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, Arial;
      background: #0f0f10;
      color: white;
    }

    .container {
      padding: 14px;
      max-width: 520px;
      margin: auto;
    }

    .header {
      background: #1a1a1c;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .weather {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    #weatherIcon { font-size: 26px; }

    #temp { font-size: 18px; }

    #humidity {
      font-size: 12px;
      color: #aaa;
    }

    .card {
      background: #1a1a1c;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .section-title {
      margin: 12px 0 6px;
      color: #aaa;
      font-size: 13px;
    }

    .direction {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 5px;
    }

    #debug {
      font-size: 10px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">📍 聚星樓交通 Dashboard</div>

    <div class="weather">
      <div id="weatherIcon">--</div>
      <div>
        <div id="temp">--°C</div>
        <div id="humidity">💧--%</div>
      </div>
    </div>

    <div id="warning" style="font-size:12px;color:#ffcc00;"></div>

    <div id="lastUpdate" style="font-size:11px;color:#888;margin-top:6px;">
      --
    </div>
  </div>

  <!-- MTR -->
  <div class="section-title">🚇 天水圍站（屯馬綫）</div>

  <div class="card">
    <div class="direction">🚆 往 屯門</div>
    <div id="mtrToTuenMun">--</div>
  </div>

  <div class="card">
    <div class="direction">🚆 往 烏溪沙</div>
    <div id="mtrToWuKaiSha">--</div>
  </div>

  <!-- BUS -->
  <div class="section-title">🚌 聚星樓</div>
  <div id="busList">--</div>

  <!-- DEBUG -->
  <div id="debug"></div>

</div>

<script src="app.js"></script>

</body>
</html>
